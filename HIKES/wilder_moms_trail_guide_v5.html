
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.page{font-family:'DM Sans',sans-serif;padding:1.5rem;max-width:840px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;flex-wrap:wrap;gap:6px}
.count{font-size:12px;color:var(--color-text-tertiary)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.fb{font-size:12px;padding:5px 13px;border-radius:99px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer}
.fb.on{background:#EAF3DE;color:#27500A;border-color:#97C459}
.region-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.rb{font-size:11px;padding:4px 11px;border-radius:99px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer}
.rb.on{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);padding:1rem 1.2rem}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px}
.hname{font-size:14px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.pname{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.stars{display:flex;gap:2px;flex-shrink:0}
.s{width:11px;height:11px}
.sf{color:#BA7517}.se{color:var(--color-border-secondary)}
.desc{font-size:12.5px;color:var(--color-text-secondary);line-height:1.7;margin-bottom:10px}
.meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.pill{font-size:11px;padding:3px 8px;border-radius:99px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.pill-warn{font-size:11px;padding:3px 8px;border-radius:99px;background:#FAEEDA;color:#633806;border:0.5px solid #EF9F27}
.wb{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:6px 10px}
.wlabel{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--color-text-tertiary);margin-bottom:4px}
.wbar{display:flex;gap:3px}
.ws{height:5px;flex:1;border-radius:3px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary)}
.w1{background:#C0DD97;border-color:#639922}
.w2{background:#97C459;border-color:#3B6D11}
.w3{background:#EF9F27;border-color:#854F0B}
.w4{background:#D85A30;border-color:#993C1D}
.w5{background:#A32D2D;border-color:#791F1F}
.wends{display:flex;justify-content:space-between;margin-top:3px}
.we{font-size:10px;color:var(--color-text-tertiary)}
.loc{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-tertiary);margin-top:6px}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot-noco{background:#7F77DD}.dot-default{background:#639922}
.badge{display:inline-block;font-size:9px;text-transform:uppercase;letter-spacing:.07em;border-radius:99px;padding:2px 6px;margin-left:4px;vertical-align:middle}
.b-noco{background:#EEEDFE;color:#3C3489}
.empty{padding:2rem;text-align:center;font-size:14px;color:var(--color-text-tertiary);grid-column:1/-1}
</style>
<div class="page">
  <div class="topbar"><span class="count" id="count-label">Loading...</span></div>
  <div class="filter-row" id="wf">
    <button class="fb on" onclick="sw('all',this)">All wildness</button>
    <button class="fb" onclick="sw('stroller',this)">Stroller-ready</button>
    <button class="fb" onclick="sw('easy',this)">Easy legs</button>
    <button class="fb" onclick="sw('moderate',this)">Getting spicy</button>
    <button class="fb" onclick="sw('wild',this)">Full wild</button>
  </div>
  <div class="region-row" id="rf">
    <button class="rb on" onclick="sr('all',this)">All regions</button>
    <button class="rb" onclick="sr('NoCo',this)">Northern Colorado</button>
    <button class="rb" onclick="sr('Denver',this)">Denver area</button>
    <button class="rb" onclick="sr('Boulder',this)">Boulder</button>
    <button class="rb" onclick="sr('Evergreen',this)">Evergreen / Foothills</button>
    <button class="rb" onclick="sr('Golden',this)">Golden</button>
    <button class="rb" onclick="sr('RMNP',this)">Rocky Mtn NP</button>
    <button class="rb" onclick="sr('ColoSprings',this)">Colo Springs</button>
  </div>
  <div class="grid" id="grid"></div>
</div>
<script>
const T=[
  {n:"Dixon Reservoir Loop",p:"Pineridge Natural Area",r:"NoCo",l:"Fort Collins",mi:"2.1 mi",g:"108 ft",rt:5,w:"stroller",desc:"Flat loop around a gorgeous reservoir with a full prairie dog town on the south side — budget extra time for the inevitable crouch-and-stare situation. In summer the north shore gets beachy enough for muddy lake play. Extra pants are not optional."},
  {n:"Keyhole via Wild Loop Trail",p:"Devil's Backbone Open Space",r:"NoCo",l:"Just outside Loveland",mi:"2.5 mi",g:"265 ft",rt:5,w:"easy",warn:"Closed Feb–June · nesting raptors",desc:"A dramatic spine of rock leads to an actual keyhole punched right through the ridgeline — kids will want to run through it seventeen times. Just past .2 miles there's a gorgeous overlook, perfect for a shorter turnaround. $10 parking, card only."},
  {n:"Reservoir Ridge to Foothills",p:"Horsetooth Reservoir",r:"NoCo",l:"Fort Collins",mi:"2.7 mi",g:"442 ft",rt:4,w:"moderate",desc:"Steep opening climb earns gorgeous Horsetooth Reservoir views fast — then it levels off and everyone can breathe again. Kids spend an alarming amount of time poking at cactus in summer. Free parking."},
  {n:"Well Gulch Natural Trail",p:"Lory State Park",r:"NoCo",l:"Fort Collins / Bellvue",mi:"2.5 mi",g:"603 ft",rt:5,w:"moderate",desc:"Grab the self-guided nature trail booklet at the Visitor's Center before heading out — the posts along the way make this feel like a real expedition. A tiny waterfall right at the start sets the tone. Deer are basically trail regulars. State pass or fee required."},
  {n:"Arthur's Rock Trail",p:"Lory State Park",r:"NoCo",l:"Fort Collins / Bellvue",mi:"3.5 mi",g:"1,100 ft",rt:5,w:"wild",desc:"The Northern Colorado bucket-list hike. Switchbacks through ponderosa pines build to a rocky summit with Fort Collins and Horsetooth Reservoir spread out below. It earns its mileage but every step is worth it. Don't skip the sunscreen. State pass or fee required."},
  {n:"Black Powder Trail",p:"Gateway Natural Area",r:"NoCo",l:"Poudre Canyon",mi:"1.5 mi",g:"436 ft",rt:4,w:"easy",desc:"Short, punchy, drops you right beside the Poudre River for a picnic that makes everyone wish they packed more food. The canyon scenery is legitimately gorgeous. Fee area. Fair warning: you'll spend the drive home planning when to come back."},
  {n:"Three Bar Trail",p:"Eagle's Nest Open Space",r:"NoCo",l:"~30 min NW of Fort Collins",mi:"3.4 mi",g:"472 ft",rt:4,w:"moderate",warn:"Partial closure Feb–July · No dogs",desc:"Golden eagles have nested on the rock formation here for over a hundred years and still show up. Big rolling foothills, river access, wide open sky. If snow hits, go counter-clockwise and bring a sled — the hill delivers. Free parking."},
  {n:"Coyote Ridge Trail",p:"Coyote Ridge Natural Area",r:"NoCo",l:"Between Loveland + Fort Collins",mi:"4.1 mi",g:"564 ft",rt:4,w:"moderate",warn:"No dogs",desc:"Starts flat through a full metropolis of prairie dogs, climbs to a restroom cabin — the perfect snack stop — then hits the ridge for big views. One of the few Fort Collins natural areas with a no-dogs rule. Free parking."},
  {n:"Bobcat Ridge Valley Loop",p:"Bobcat Ridge Natural Area",r:"NoCo",l:"Masonville, near Fort Collins",mi:"4.5 mi",g:"500 ft",rt:4,w:"moderate",warn:"No dogs · No e-bikes",desc:"Grassy valley, ponderosa cliffs, elk, wild turkey, and old homestead ruins throughout — this place has layers. Multiple trail options from mellow to challenging, all sharing the same wide-open feeling. Free parking off Larimer County Rd 32C."},
  {n:"Horsetooth Falls Loop",p:"Horsetooth Mountain Open Space",r:"NoCo",l:"Fort Collins",mi:"3.2 mi",g:"636 ft",rt:5,w:"moderate",desc:"Hit this in spring snowmelt when the waterfall is absolutely raging and the stream tears all the way down the mountain. Limited shade so go early and hydrate. Bathrooms and parking at the trailhead. A genuine Fort Collins classic."},
  {n:"Dowdy Lake Trail",p:"Roosevelt National Forest",r:"NoCo",l:"Red Feather Lakes",mi:"2.3 mi",g:"Flat",rt:5,w:"stroller",desc:"Peaceful flat loop around a beautiful high-country lake inside Roosevelt National Forest. In summer it turns into a full paddleboard-and-kayak situation, which is exactly what we're here for. One of those places that makes you wonder why you don't come every weekend."},

  {n:"Bruin Bluff Loop",p:"Lair O' the Bear Park",r:"Denver",l:"~40 min from Denver",mi:"1.5 mi",g:"216 ft",rt:5,w:"stroller",desc:"Creek access, a shaded outdoor classroom, and picnic tables at the finish — this trail basically plans the outing for you. Summer mornings fill fast so aim for before 8am or after 4pm for a peaceful experience."},
  {n:"Davis Ponds Loop",p:"Staunton State Park",r:"Denver",l:"SW of Denver",mi:"2.3 mi",g:"236 ft",rt:5,w:"stroller",desc:"Wide packed trail built for all-terrain strollers and wheelchairs — genuinely accessible for the whole crew. Two stocked fishing ponds at the finish give kids something to do while the adults finish a sentence. State park pass required."},
  {n:"Raccoon Trail",p:"Golden Gate Canyon State Park",r:"Denver",l:"~45 min from Denver",mi:"2.6 mi",g:"456 ft",rt:5,w:"moderate",desc:"Wildflower meadows in summer, golden aspens in fall, sparkly snow in winter — this trail shows up in every season. The elevation gain is real but the trail is kind about it. One of the best-kept secrets in Golden Gate Canyon. State park pass required."},
  {n:"Genesee Summit Trail",p:"Genesee Park",r:"Denver",l:"Right off I-70",mi:"1.1 mi",g:"170 ft",rt:4,w:"easy",desc:"When you have 45 minutes and someone is losing their mind in the back seat, this is your trail. Right off the highway, short enough to actually finish, beautiful enough to feel like it counts. Check for ice and mud in shoulder seasons."},
  {n:"Sleepy S Trail",p:"Elk Meadow Park",r:"Denver",l:"Near Evergreen",mi:"2.1 mi",g:"255 ft",rt:4,w:"easy",desc:"Elk herds hanging out in a big open meadow, not subtle about it at all. Wide flat trail, no scary edges, minimal shade. Morning is the move in summer. If your kids have never seen a wild elk up close, start here."},
  {n:"Owl's Perch / Lodge Pole Loop",p:"Meyer Ranch Park",r:"Denver",l:"Off Hwy 285",mi:"1.5 mi",g:"200 ft",rt:4,w:"easy",desc:"Late September is the move — the aspens turn golden and the whole park looks like a painting. Easy enough for little legs to do independently, gorgeous enough to actually look forward to. Connecting trails if you want to keep going."},
  {n:"Castlewood Canyon",p:"Castlewood Canyon State Park",r:"Denver",l:"Castle Rock, ~45 min",mi:"1.2–3.0 mi",g:"Varies",rt:5,w:"moderate",warn:"Poison ivy on trail edges",desc:"In 1933 a dam burst and sent a wall of water toward Denver — the ruins are still here and kids will be completely obsessed with the story. Creek crawfish, canyon scrambles, and multiple trail lengths to mix and match based on energy levels. State park pass required."},
  {n:"Castle Rock Trail",p:"Rock Park",r:"Denver",l:"Castle Rock, ~30 min S",mi:"1.4 mi",g:"~300 ft",rt:4,w:"easy",desc:"You're hiking to the base of the actual rock the town is named after. Peregrine falcons nest up here. Older kids can scramble to the summit and touch the star at the top — the kind of thing they talk about for weeks."},
  {n:"Waterton Canyon Trail",p:"South Platte River",r:"Denver",l:"Littleton, ~30 min",mi:"Up to 6.5 mi",g:"Gentle",rt:5,w:"easy",warn:"No dogs",desc:"Bighorn sheep come right down onto the wide dirt road here with startling regularity. Great for fishing families and jogger strollers. No dogs — but the sheep absolutely make up for it. Go as far as you like and turn back whenever."},
  {n:"Fountain Valley Loop",p:"Roxborough State Park",r:"Denver",l:"SW Denver Metro",mi:"2.3 mi",g:"344 ft",rt:5,w:"moderate",warn:"No dogs · No bikes · Rattlesnakes Apr–Oct",desc:"Everything that makes Colorado incredible, compressed into one trail. Towering red fins, abundant wildlife, views that people drive hours for. Rattlesnakes are real Apr–Oct so stay on trail. State park pass required."},
  {n:"Coyote Song Trail",p:"South Valley Park",r:"Denver",l:"SW Denver Metro",mi:"3.0 mi",g:"320 ft",rt:4,w:"moderate",desc:"Wide open and packed with wildlife — elk, deer, raptors, snakes. Go early before the heat hits. Also a solid beginner biking trail for any kids on two wheels."},
  {n:"Red Rocks Trading Post Trail",p:"Red Rocks Park",r:"Denver",l:"Morrison, ~30 min",mi:"1.5 mi",g:"350 ft",rt:4,w:"moderate",desc:"All the drama of Red Rocks — scrambles, stairs, amphitheater views — no concert ticket required. Some rocky sections make it a little chunky for the very youngest hikers but the payoff is absolutely worth it."},

  {n:"Mount Falcon Lookout",p:"Mt. Falcon West Trailhead",r:"Evergreen",l:"Indian Hills, ~45 min",mi:"1.4 mi",g:"180 ft",rt:5,w:"easy",desc:"Bathrooms at the trailhead, pavilion at the top, mountain views the whole way up. This trail is organized. Pack a picnic dinner and go at golden hour — you'll stay well past dark. Works every single time regardless of who's in the group."},
  {n:"Deer Creek Canyon Loop",p:"Deer Creek Canyon Park",r:"Evergreen",l:"Littleton / Foothills",mi:"2.8 mi",g:"830 ft",rt:5,w:"moderate",desc:"Red rock walls, raptors overhead, and a shaded creek section that feels genuinely miles from any suburb. The Meadowlark and Plymouth Creek trails combine into a loop that earns its mileage. Dog-friendly on leash."},
  {n:"Lookout Mountain Forest Loop",p:"Lookout Mountain Nature Center",r:"Evergreen",l:"Golden / Lookout Mountain",mi:"0.5 mi",g:"Minimal",rt:4,w:"stroller",desc:"Flat, shaded, and made for the smallest explorers in the group. Half a mile through pine forest ending at the Lookout Mountain Nature Center with exhibits and a great picnic spot. Tack on the 0.7-mile Meadow Loop if legs are still going."},
  {n:"Alderfer / Three Sisters Loop",p:"Alderfer / Three Sisters Park",r:"Evergreen",l:"Evergreen",mi:"3.5 mi",g:"570 ft",rt:5,w:"moderate",desc:"Stone ruins, streams, rock formations, and stretches of shade — this trail stacks up experiences that make kids forget they're hiking. Multiple shorter loop options if you need a bailout plan. Dog-friendly."},
  {n:"Evergreen Lake Trail",p:"Evergreen Lake",r:"Evergreen",l:"Downtown Evergreen",mi:"1.4 mi",g:"Flat",rt:5,w:"stroller",desc:"Flat, quick, gorgeous, and Baskin-Robbins on the way back is non-negotiable. Wildlife, a rushing dam, and a lake loop that works in every season. In winter it becomes an ice skating rink. Year-round winner."},
  {n:"Chief Mountain Trail",p:"Arapaho National Forest",r:"Evergreen",l:"Just outside Evergreen",mi:"2.8 mi",g:"~900 ft",rt:5,w:"wild",desc:"Switchbacks through the trees for 1.4 miles then suddenly — 360 degrees of Pikes Peak, Longs Peak, and the whole Front Range laid out below. Pack a real lunch and plan to stay. Nobody wants to leave once they're up there."},
  {n:"Independence Mountain Trail",p:"Pence Park",r:"Evergreen",l:"Indian Hills",mi:"2.1 mi",g:"Moderate",rt:4,w:"moderate",desc:"One mile through the trees to a rocky outcropping with sweeping views of Evergreen and Kittredge. Bring a proper spread — granola bars feel embarrassingly undersized up here. The views earn a full picnic every time."},

  {n:"Clear Creek Trail",p:"Downtown Golden",r:"Golden",l:"Golden, ~30 min",mi:"Up to 19 mi",g:"Flat",rt:5,w:"stroller",desc:"Paved, smooth, creek right alongside you the whole way. Kids can rock-hop and wade while you walk at a pace that actually counts as exercise. Go as far as you want, turn around, and end at an ice cream shop. Colorado parenting at its peak."},
  {n:"Lookout Mountain / Beaver Brook",p:"Lookout Mountain Park",r:"Golden",l:"Golden",mi:"3.2 mi",g:"725 ft",rt:4,w:"moderate",desc:"CCC crews built this trail in the 1930s and it still feels like a proper adventure. Denver views open up on the ascent and the Buffalo Bill Museum waits at the top — equal parts hike and history lesson. Kids love both more than they expect to."},
  {n:"North Table Mountain / Lichen Peak",p:"North Table Mountain Park",r:"Golden",l:"Golden",mi:"1.6 mi",g:"Moderate",rt:4,w:"easy",desc:"Short enough for a Tuesday after school, stunning enough to feel like a real adventure. Views of Golden, the Front Range, and Denver from the mesa top. Park at the West Trailhead for the best start."},

  {n:"Sprague Lake Loop",p:"Rocky Mountain National Park",r:"RMNP",l:"Estes Park / RMNP",mi:"0.8 mi",g:"Flat",rt:5,w:"stroller",warn:"Timed entry permit required May–Oct",desc:"Boardwalk loop at 8,700 feet with the entire Continental Divide reflected in the lake in front of you. The kind of view that makes everyone go quiet for a minute. One of the most accessible truly alpine experiences in Colorado. Plan ahead for the permit."},
  {n:"Lily Lake Trail",p:"Rocky Mountain National Park",r:"RMNP",l:"Estes Park / RMNP",mi:"0.8 mi",g:"Flat",rt:5,w:"stroller",desc:"Flat loop around a wildflower-rimmed alpine lake with snowy peaks all around. All-terrain stroller friendly. Easy enough for any age, beautiful enough for everyone. You will be back next weekend."},
  {n:"Emerald Lake via Bear Lake",p:"Rocky Mountain National Park",r:"RMNP",l:"Estes Park / RMNP",mi:"3.6 mi",g:"605 ft",rt:5,w:"moderate",warn:"Timed entry permit required May–Oct",desc:"Three lakes back to back — Nymph, Dream, Emerald — each more jaw-dropping than the last. The hike that turns kids into people who actually want to go hiking. Go at dawn or take the free park shuttle."},

  {n:"Boulder Falls",p:"Boulder Canyon",r:"Boulder",l:"15 min from downtown Boulder",mi:"0.25 mi",g:"Minimal",rt:5,w:"stroller",desc:"A 70-foot waterfall that is literally a 10-minute walk from the parking area. The hike is almost beside the point. Kids will be completely unhinged with excitement. Pair with a stop in Nederland and call it a full mountain day."},
  {n:"Boulder Creek Path",p:"Boulder Creek",r:"Boulder",l:"Boulder",mi:"Up to 7.6 mi",g:"Flat",rt:4,w:"stroller",desc:"Boulder's entire personality in one paved path — creek access, wildlife, shade, coffee in hand, the whole city walking next to you. Stroller perfect. Go as far as the crew is willing and nobody will complain."},
  {n:"Coot Lake Trail",p:"Boulder Reservoir Area",r:"Boulder",l:"N. Boulder, off Diagonal Hwy",mi:"1.3 mi",g:"32 ft",rt:4,w:"stroller",warn:"Seasonal wetland closures apply",desc:"A flat loop around a wildlife-rich lake with an actual art walk built into the trail — interpretive signs and prints that kids stop and read every time. Birdwatching is the main event: osprey, bald eagles, red-winged blackbirds, and the rare northern harrier all call this place home. Fishing allowed with a Colorado license. Dogs welcome with Voice & Sight tag."},
  {n:"Anne U. White Trail",p:"Fourmile Canyon Creek",r:"Boulder",l:"NW Boulder, off Lee Hill Rd",mi:"3.2 mi",g:"479 ft",rt:5,w:"easy",warn:"No bikes · Poison ivy present · Mountain lion area",desc:"A narrow canyon creek trail that crosses the water multiple times on big flat stepping stones — kids will splash and scramble their way through all 3.2 miles without ever feeling like they're on a hike. Ends at a waterfall in a rocky basin. Shaded and cool even in summer. Parking is very limited so get there early. Dogs welcome on leash."},
  {n:"Enchanted Mesa Trail",p:"Chautauqua Park",r:"Boulder",l:"Boulder",mi:"1.6 mi",g:"413 ft",rt:5,w:"easy",desc:"Wide pine-forest paths with Flatirons views around every corner. The name is genuinely not overselling it. Parking behind Chautauqua is more manageable than most Boulder trailheads. Bring everyone."},
  {n:"Marshall Mesa / Flatirons Vista",p:"Boulder Open Space",r:"Boulder",l:"South Boulder",mi:"3.3 mi",g:"400 ft",rt:4,w:"easy",desc:"Two connected mesas linked by a tunnel under Hwy 93 that kids sprint through every time. Wide meadow paths with Flatiron views that don't quit. $5 parking fee. Check conditions after rain — the clay gets slick fast."},
  {n:"Shanahan Ridge Trail",p:"Boulder Open Space",r:"Boulder",l:"South Boulder, street parking",mi:"4.2 mi",g:"800 ft",rt:4,w:"moderate",warn:"Street parking only · Seasonal mud closures · Check dog regs",desc:"Starts at the edge of a South Boulder neighborhood and winds up through ponderosa forest with big Flatiron views opening up as you climb. North and South Fork options let you build your own loop — go as short as 2.4 miles or do the full 4.2. Well-signed but pull up a map anyway; the junction choices are real. Dogs welcome, but regulations vary by section seasonally."},
  {n:"Lost Gulch Overlook",p:"Flagstaff Mountain",r:"Boulder",l:"Flagstaff Road",mi:"0.5 mi",g:"Gentle",rt:5,w:"easy",desc:"Barely half a mile to a rocky overlook with panoramic Continental Divide views and picnic tables to sit and take it all in. Take the left fork for the better approach. $5 parking fee. Short enough to be no big deal, beautiful enough to feel like one."},
  {n:"Tenderfoot / Chapman Trail",p:"Flagstaff Mountain",r:"Boulder",l:"Realization Point",mi:"2.5 mi",g:"Moderate",rt:4,w:"moderate",desc:"Snowcapped mountain views open up immediately from Realization Point — no warming up required. Connects to the Chapman fire road for a smooth return loop. Come right after the first snowfall and it becomes something genuinely magical."},
  {n:"NCAR Trail",p:"Natl Ctr for Atmospheric Research",r:"Boulder",l:"South Boulder",mi:"3.3 mi",g:"718 ft",rt:4,w:"moderate",desc:"Rocky singletrack that earns proper Flatiron views from the mesa with interpretive signs from an actual atmospheric research facility along the way. More challenging than it looks from the parking lot — good boots required, stroller not suitable. Arrives early as parking fills up on weekends."},
  {n:"Eben G. Fine Park",p:"Boulder Creek Path",r:"Boulder",l:"West Boulder",mi:"Up to 5.5 mi",g:"Flat",rt:5,w:"stroller",desc:"Playground, creek access, summer tubing, and paved accessible paths — Eben G. Fine is base camp for a full Boulder creek day. Stroller and wheelchair accessible throughout. Weekdays are significantly calmer than weekends."},
  {n:"Bald Mountain Scenic Area",p:"Boulder Open Space",r:"Boulder",l:"Sunshine Canyon",mi:"1.0 mi",g:"Moderate",rt:4,w:"easy",desc:"Fifteen minutes up Sunshine Canyon Road and a short trail opens into a wide summit meadow — Boulder Valley one way, snowy Continental Divide peaks the other. Short, punchy, and completely worth it."},

  {n:"Garden of the Gods Main Loop",p:"Garden of the Gods",r:"ColoSprings",l:"Colorado Springs",mi:"4.0 mi",g:"Moderate",rt:5,w:"easy",desc:"The towering red sandstone formations here make kids go completely silent and then immediately start climbing. Pikes Peak as the backdrop, the Siamese Twins window as the money shot. Weekday mornings are a genuinely different, better experience."},
  {n:"Seven Bridges Trail",p:"N. Cheyenne Canyon Park",r:"ColoSprings",l:"Colorado Springs",mi:"3.5 mi",g:"~800 ft",rt:5,w:"moderate",desc:"Seven bridges over a rushing creek through a shaded canyon — kids count every one and have opinions about each. Cool and shaded even in summer, dramatic in spring runoff. One of the best hikes in Colorado Springs, full stop."},
  {n:"Cottonwood Creek Trail",p:"Cottonwood Creek Park",r:"ColoSprings",l:"Colorado Springs",mi:"6 mi one way",g:"Flat",rt:4,w:"stroller",desc:"Wide, paved, flat, with a great 2-mile loop option ideal for jogger stroller runs and bike rides. Connects to bigger trail systems for the crew with extra energy. The kind of trail you do on a weekday morning without overthinking it."},
  {n:"New Santa Fe Regional Trail",p:"El Paso County",r:"ColoSprings",l:"Palmer Lake to Colo Springs",mi:"14 mi one way",g:"Gentle",rt:4,w:"easy",desc:"Six feet wide, smooth gravel that goes on for days — perfect for jogger strollers, kid bikes, and anyone who just needs to move. Passes through the Air Force Academy so stay on trail. One of the best long flat options on the Front Range."},
];

let aW='all',aR='all';
const wl={stroller:'Stroller-ready',easy:'Easy legs',moderate:'Getting spicy',wild:'Full wild'};
const wn={stroller:1,easy:2,moderate:3,wild:4};
function stars(n){return Array.from({length:5},(_,i)=>`<svg class="s ${i<n?'sf':'se'}" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l1.8 3.6L14 5.3l-3 2.9.7 4.1L8 10.4l-3.7 1.9.7-4.1-3-2.9 4.2-.7z"/></svg>`).join('');}
function bar(cat){const n=wn[cat]||1;return `<div class="wb"><div class="wlabel">Wildness — ${wl[cat]||cat}</div><div class="wbar">${Array.from({length:5},(_,i)=>`<div class="ws${i<n?' w'+n:''}"></div>`).join('')}</div><div class="wends"><span class="we">stroller</span><span class="we">full wild</span></div></div>`;}
function render(){
  const f=T.filter(t=>(aW==='all'||t.w===aW)&&(aR==='all'||t.r===aR));
  document.getElementById('count-label').textContent=`${f.length} trail${f.length!==1?'s':''} found`;
  if(!f.length){document.getElementById('grid').innerHTML=`<div class="empty">No trails match — try loosening a filter!</div>`;return;}
  document.getElementById('grid').innerHTML=f.map(t=>{
    const noco=t.r==='NoCo';
    const badge=noco?`<span class="badge b-noco">N. Colorado</span>`:'';
    const wp=t.warn?`<span class="pill-warn">${t.warn}</span>`:'';
    return `<div class="card">
      <div class="ctop"><div><div class="hname">${t.n}${badge}</div><div class="pname">${t.p}</div></div><div class="stars">${stars(t.rt)}</div></div>
      <p class="desc">${t.desc}</p>
      <div class="meta"><span class="pill">${t.mi}</span><span class="pill">${t.g} elev</span>${wp}</div>
      ${bar(t.w)}
      <div class="loc"><span class="dot ${noco?'dot-noco':'dot-default'}"></span>${t.l}</div>
    </div>`;
  }).join('');
}
function sw(v,b){aW=v;document.querySelectorAll('#wf .fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();}
function sr(v,b){aR=v;document.querySelectorAll('#rf .rb').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();}
render();
</script>
